<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALNS Dashboard - Análisis Estadístico</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3347;--text:#e4e6f0;--text2:#8b8fa8;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00cec9;--orange:#fdcb6e;--red:#e17055;--blue:#74b9ff;--pink:#fd79a8;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
h1{text-align:center;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:32px;font-size:.95rem}
.grid{display:grid;gap:20px;margin-bottom:20px}
.grid-4{grid-template-columns:repeat(4,1fr)}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,92,231,.15)}
.card h3{font-size:.8rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:12px;font-weight:600}
.kpi{font-size:2.2rem;font-weight:800}.kpi-sub{font-size:.85rem;color:var(--text2);margin-top:4px}
.kpi.accent{color:var(--accent2)}.kpi.green{color:var(--green)}.kpi.orange{color:var(--orange)}.kpi.blue{color:var(--blue)}
.chart-card{min-height:340px}.chart-card canvas{max-height:300px}
table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;padding:12px 16px;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);border-bottom:2px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-green{background:rgba(0,206,201,.15);color:var(--green)}
.badge-orange{background:rgba(253,203,110,.15);color:var(--orange)}
.badge-red{background:rgba(225,112,85,.15);color:var(--red)}
.badge-blue{background:rgba(116,185,255,.15);color:var(--blue)}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text2);font-size:.85rem}
.stat-value{font-weight:600;font-size:.95rem}
.section-title{font-size:1.3rem;font-weight:700;margin:32px 0 16px;padding-left:12px;border-left:4px solid var(--accent)}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>📊 ALNS — Análisis Estadístico</h1>
<p class="subtitle">350 envíos · 10 réplicas independientes · Shapiro-Wilk · IC 95%</p>
<div id="loading"><div class="spinner"></div><p style="color:var(--text2)">Cargando datos...</p></div>
<div id="app" style="display:none"></div>
<script>
const C={accent:'#6c5ce7',accent2:'#a29bfe',green:'#00cec9',orange:'#fdcb6e',red:'#e17055',blue:'#74b9ff',pink:'#fd79a8'};
const PAL=['#6c5ce7','#00cec9','#fdcb6e','#74b9ff','#fd79a8','#e17055','#a29bfe','#55efc4','#fab1a0','#81ecec'];
Chart.defaults.color='#8b8fa8';Chart.defaults.borderColor='#2e3347';Chart.defaults.font.family='Inter';

fetch('data/test_results.json').then(r=>r.json()).then(data=>{
  document.getElementById('loading').style.display='none';
  const app=document.getElementById('app');app.style.display='block';
  render(data,app);
}).catch(e=>{
  document.getElementById('loading').innerHTML=`<p style="color:${C.red}">Error: ${e.message}</p><p style="color:#8b8fa8">Ejecuta TestRapido.java primero.</p>`;
});

function fmt(v,d=2){return Number(v).toLocaleString('es',{minimumFractionDigits:d,maximumFractionDigits:d})}

function render(data,app){
  const res=data.resultados;
  app.innerHTML=`
  <div class="section-title">📋 Resultados Estadísticos por Configuración</div>
  <div class="grid grid-2">
    ${res.map((r,i)=>`
    <div class="card">
      <h3>ALNS ${r.iteraciones} Iteraciones · ${r.replicas} Réplicas</h3>
      <div class="stat-row"><span class="stat-label">Media del Fitness</span><span class="stat-value" style="color:${[C.accent2,C.green][i]}">${fmt(r.mean,4)}</span></div>
      <div class="stat-row"><span class="stat-label">Desviación Estándar</span><span class="stat-value">${fmt(r.stdDev,4)}</span></div>
      <div class="stat-row"><span class="stat-label">IC 95% (t-Student)</span><span class="stat-value">[${fmt(r.ci95Lower,4)}, ${fmt(r.ci95Upper,4)}]</span></div>
      <div class="stat-row"><span class="stat-label">Tiempo medio (s)</span><span class="stat-value">${fmt(r.meanTime,3)}s</span></div>
      <div class="stat-row"><span class="stat-label">Media Paq. Asignados</span><span class="stat-value">${fmt(r.meanAsig,1)} / 350</span></div>
      <div class="stat-row"><span class="stat-label">% Asignados (media)</span><span class="stat-value">${fmt(r.meanPct,2)}%</span></div>
      <hr style="border-color:var(--border);margin:12px 0">
      <h3>🔬 Prueba de Shapiro-Wilk (Normalidad)</h3>
      <div class="stat-row"><span class="stat-label">Estadístico W</span><span class="stat-value" style="color:${C.blue}">${r.shapiroW.toFixed(6)}</span></div>
      <div class="stat-row"><span class="stat-label">p-value</span><span class="stat-value" style="color:${r.shapiroP>0.05?C.green:C.red}">${r.shapiroP.toFixed(6)}</span></div>
      <div class="stat-row"><span class="stat-label">¿Distribución Normal? (α=0.05)</span><span class="stat-value">
        <span class="badge ${r.shapiroP>0.05?'badge-green':'badge-red'}">${r.shapiroP>0.05?'SÍ — No se rechaza H₀':'NO — Se rechaza H₀'}</span>
      </span></div>
      <div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;font-size:.8rem;color:var(--text2)">
        H₀: Los datos siguen una distribución normal<br>
        H₁: Los datos NO siguen una distribución normal<br>
        Criterio: Si p-value > 0.05 → No se rechaza H₀
      </div>
    </div>`).join('')}
  </div>

  <div class="section-title">📊 Tabla Comparativa Completa</div>
  <div class="card" style="overflow-x:auto">
    <table>
      <thead><tr><th>Iteraciones</th><th>Media Fitness</th><th>Desv. Est.</th><th>IC 95%</th><th>Tiempo(s)</th><th>Asignados</th><th>% Asig.</th><th>W (S-W)</th><th>p-value</th><th>Normal?</th></tr></thead>
      <tbody>
      ${res.map(r=>`<tr>
        <td>${r.iteraciones}</td>
        <td>${fmt(r.mean,4)}</td>
        <td>${fmt(r.stdDev,4)}</td>
        <td>[${fmt(r.ci95Lower,2)}, ${fmt(r.ci95Upper,2)}]</td>
        <td>${fmt(r.meanTime,3)}</td>
        <td>${fmt(r.meanAsig,1)}/350</td>
        <td>${fmt(r.meanPct,2)}%</td>
        <td>${r.shapiroW.toFixed(6)}</td>
        <td style="color:${r.shapiroP>0.05?C.green:C.red}">${r.shapiroP.toFixed(6)}</td>
        <td><span class="badge ${r.shapiroP>0.05?'badge-green':'badge-red'}">${r.shapiroP>0.05?'SÍ':'NO'}</span></td>
      </tr>`).join('')}
      </tbody>
    </table>
  </div>

  <div class="section-title">📈 Valores de Fitness por Réplica</div>
  <div class="grid grid-2">
    <div class="card chart-card"><h3>Fitness por Réplica</h3><canvas id="chartReplicas"></canvas></div>
    <div class="card chart-card"><h3>🥧 Distribución por Prioridad</h3><canvas id="chartPrio"></canvas></div>
  </div>

  <div class="section-title">📊 Análisis del Dataset</div>
  <div class="grid grid-3">
    <div class="card chart-card"><h3>📈 Serie Temporal — Envíos/Día</h3><canvas id="chartTS"></canvas></div>
    <div class="card chart-card"><h3>📊 Histograma — Maletas/Envío</h3><canvas id="chartHist"></canvas></div>
    <div class="card chart-card"><h3>📦 Boxplot — Transporte (min)</h3><canvas id="chartBox"></canvas></div>
  </div>

  <div class="grid grid-2">
    <div class="card chart-card"><h3>✈️ Top Destinos</h3><canvas id="chartDest"></canvas></div>
    <div class="card">
      <h3>📋 Detalle de Réplicas</h3>
      <table>
        <thead><tr><th>#</th>${res.map(r=>`<th>${r.iteraciones} iter (Fitness)</th><th>Tiempo</th>`).join('')}</tr></thead>
        <tbody>
        ${Array.from({length:res[0].replicas},(_,i)=>`<tr>
          <td>${i+1}</td>
          ${res.map(r=>`<td>${fmt(r.fitnessValues[i],2)}</td><td>${fmt(r.tiempoValues[i],3)}s</td>`).join('')}
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  // Charts
  // 1. Fitness por replica
  new Chart(document.getElementById('chartReplicas'),{type:'bar',
    data:{labels:Array.from({length:res[0].replicas},(_,i)=>'R'+(i+1)),
      datasets:res.map((r,i)=>({label:r.iteraciones+' iter',data:r.fitnessValues,
        backgroundColor:[C.accent+'aa',C.green+'aa'][i],borderColor:[C.accent,C.green][i],
        borderWidth:1,borderRadius:4}))},
    options:{responsive:true,scales:{y:{title:{display:true,text:'Fitness'}}},
      plugins:{legend:{position:'top'}}}
  });

  // 2. Prioridad
  const p=data.prioridades;
  new Chart(document.getElementById('chartPrio'),{type:'doughnut',
    data:{labels:['Alta (P1)','Media (P2)','Baja (P3)'],
      datasets:[{data:[p.alta,p.media,p.baja],backgroundColor:[C.red+'dd',C.orange+'dd',C.green+'dd'],
        borderColor:'#1a1d27',borderWidth:3}]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{padding:16}}}}
  });

  // 3. Serie temporal
  new Chart(document.getElementById('chartTS'),{type:'line',
    data:{labels:data.enviosPorDia.map(d=>d.fecha),
      datasets:[{label:'Envíos',data:data.enviosPorDia.map(d=>d.cantidad),
        borderColor:C.accent,backgroundColor:'rgba(108,92,231,.15)',fill:true,tension:.4,
        pointRadius:4,pointBackgroundColor:C.accent2,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{maxRotation:45}},y:{beginAtZero:true,title:{display:true,text:'Cantidad'}}}}
  });

  // 4. Histograma
  const bins={};data.cantidades.forEach(c=>{bins[c]=(bins[c]||0)+1});
  const bk=Object.keys(bins).map(Number).sort((a,b)=>a-b);
  new Chart(document.getElementById('chartHist'),{type:'bar',
    data:{labels:bk.map(k=>k+' mal.'),datasets:[{label:'Frecuencia',data:bk.map(k=>bins[k]),
      backgroundColor:bk.map((_,i)=>PAL[i%PAL.length]+'cc'),borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,title:{display:true,text:'Frecuencia'}}}}
  });

  // 5. Boxplot
  const bc=document.getElementById('chartBox');
  drawBoxplot(bc,res);

  // 6. Destinos
  const de=Object.entries(data.destinos).sort((a,b)=>b[1]-a[1]).slice(0,15);
  new Chart(document.getElementById('chartDest'),{type:'bar',
    data:{labels:de.map(e=>e[0]),datasets:[{label:'Envíos',data:de.map(e=>e[1]),
      backgroundColor:de.map((_,i)=>PAL[i%PAL.length]+'bb'),borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true},x:{ticks:{maxRotation:45}}}}
  });
}

function drawBoxplot(canvas,results){
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement.clientWidth-48,H=280;
  canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const pad={t:20,b:40,l:70,r:120};
  const plotW=W-pad.l-pad.r,plotH=H-pad.t-pad.b;
  let gMin=Infinity,gMax=-Infinity;
  results.forEach(r=>{const v=r.tiemposTransporte;if(!v.length)return;
    r._box=boxStats(v);gMin=Math.min(gMin,r._box.min);gMax=Math.max(gMax,r._box.max)});
  const range=gMax-gMin||1;const toX=v=>pad.l+((v-gMin)/range)*plotW;
  const colors=[C.accent,C.green];const boxH=Math.min(50,plotH/results.length-20);
  ctx.strokeStyle='#2e3347';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const v=gMin+range*i/5;const x=toX(v);
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,H-pad.b);ctx.stroke();
    ctx.fillStyle='#8b8fa8';ctx.font='11px Inter';ctx.textAlign='center';ctx.fillText(Math.round(v)+'',x,H-pad.b+16)}
  ctx.fillText('Tiempo de Transporte (min)',W/2,H-4);
  results.forEach((r,i)=>{if(!r._box)return;const b=r._box;const cy=pad.t+(i+.5)*(plotH/results.length);const c=colors[i];
    ctx.strokeStyle=c;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(toX(b.min),cy);ctx.lineTo(toX(b.q1),cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(toX(b.q3),cy);ctx.lineTo(toX(b.max),cy);ctx.stroke();
    [b.min,b.max].forEach(v=>{ctx.beginPath();ctx.moveTo(toX(v),cy-boxH/4);ctx.lineTo(toX(v),cy+boxH/4);ctx.stroke()});
    const x1=toX(b.q1),x3=toX(b.q3);ctx.fillStyle=c+'33';ctx.fillRect(x1,cy-boxH/2,x3-x1,boxH);
    ctx.strokeStyle=c;ctx.strokeRect(x1,cy-boxH/2,x3-x1,boxH);
    ctx.beginPath();ctx.moveTo(toX(b.med),cy-boxH/2);ctx.lineTo(toX(b.med),cy+boxH/2);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=c;ctx.font='bold 12px Inter';ctx.textAlign='right';ctx.fillText(r.iteraciones+' iter',pad.l-10,cy+4);
    ctx.fillStyle='#8b8fa8';ctx.font='10px Inter';ctx.textAlign='left';ctx.fillText(`Med:${b.med} Q1:${b.q1} Q3:${b.q3}`,toX(b.max)+8,cy+4)});
}
function boxStats(v){const n=v.length;return{min:v[0],q1:v[Math.floor(n*.25)],med:v[Math.floor(n*.5)],q3:v[Math.floor(n*.75)],max:v[n-1]}}
</script>
</body>
</html>
